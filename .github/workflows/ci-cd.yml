name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tg-glonass-bot-main/package-lock.json
            glonass_bot_frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: tg-glonass-bot-main
        run: npm ci

      - name: Build backend gate
        working-directory: tg-glonass-bot-main
        run: npm run build:gate

      - name: Build backend worker
        working-directory: tg-glonass-bot-main
        run: npm run build:worker

      - name: Lint backend
        working-directory: tg-glonass-bot-main
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: glonass_bot_frontend
        run: npm ci

      - name: Build frontend
        working-directory: glonass_bot_frontend
        run: npm run build

      - name: Lint frontend
        working-directory: glonass_bot_frontend
        run: npm run lint

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            bash deploy/up.sh
            docker compose ps
